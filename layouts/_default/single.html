{{ define "main" }}
<article class="page">
  <header class="page-head">
    <div class="wrap">
      {{ with .Params.eyebrow }}<p class="eyebrow">{{ . }}</p>{{ end }}
      <h1>{{ .Title }}</h1>
      {{ with .Params.lede }}<p class="lead">{{ . }}</p>{{ end }}
    </div>
  </header>
  <div class="wrap prose">
    {{ .Content }}
  </div>
</article>
{{ end }}
