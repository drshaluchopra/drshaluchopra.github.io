<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cover options</title>
<style>
  body{margin:0;background:#FAF5EE;font-family:Georgia,serif;padding:30px}
  h1{font-weight:500;font-size:20px;color:#241F1B}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:26px;max-width:1100px}
  .opt{text-align:center}
  .opt .cover{border-radius:3px 7px 7px 3px;overflow:hidden;box-shadow:0 1px 1px rgba(0,0,0,.1),0 16px 36px rgba(40,30,30,.28)}
  .opt p{font-family:Inter,system-ui,sans-serif;font-size:13px;color:#6B6259;margin:12px 0 0;letter-spacing:.04em;text-transform:uppercase}
  @media(max-width:820px){.grid{grid-template-columns:repeat(2,1fr)}}
</style></head><body>
<h1>Manipulative Realities — cover colour options</h1>
<div class="grid" id="grid"></div>
<script>
var themes=[
 {name:"1 · Cream (light)", bg:"#F1E7D8", spine:"#E2D4C0", spine2:"#CBB79E", ring:"#B7A688", title:"#241F1B", g1:"#3E8FB0", g2:"#C2683C", sub:"#6B6259", author:"#241F1B", scan:"#000000", scanop:"0.04"},
 {name:"2 · Oxblood", bg:"#4E1F2A", spine:"#371521", spine2:"#6A3744", ring:"#834C58", title:"#F3EDE3", g1:"#E2A06A", g2:"#9CB7A8", sub:"#DcC6Cc", author:"#F3EDE3", scan:"#FFFFFF", scanop:"0.05"},
 {name:"3 · Deep teal", bg:"#123A38", spine:"#0C2A29", spine2:"#2C5754", ring:"#3F706B", title:"#F3EDE3", g1:"#E8935F", g2:"#74C3B2", sub:"#BFD8D3", author:"#F3EDE3", scan:"#FFFFFF", scanop:"0.05"},
 {name:"4 · Terracotta", bg:"#A8542C", spine:"#883F1F", spine2:"#C5835C", ring:"#CC9670", title:"#FBF4EA", g1:"#234E59", g2:"#3A2730", sub:"#F4DECB", author:"#FBF4EA", scan:"#FFFFFF", scanop:"0.05"}
];
function cover(t){return `
<svg viewBox="0 0 320 480" style="display:block;width:100%;height:auto">
 <defs><pattern id="s_${t.name.charCodeAt(0)}" width="5" height="4" patternUnits="userSpaceOnUse"><rect width="5" height="1" fill="${t.scan}" opacity="${t.scanop}"/></pattern></defs>
 <rect width="320" height="480" fill="${t.bg}"/>
 <rect width="320" height="480" fill="url(#s_${t.name.charCodeAt(0)})"/>
 <rect width="11" height="480" fill="${t.spine}"/><rect x="11" width="2" height="480" fill="${t.spine2}"/>
 <polygon points="166,150 276,330 56,330" fill="none" stroke="${t.title}" opacity="0.06" stroke-width="1"/>
 <circle cx="139" cy="146" r="38" fill="none" stroke="${t.ring}" stroke-width="1.4"/>
 <polygon points="129,130 129,162 159,146" fill="${t.g1}" opacity="0.85" transform="translate(-3,0)"/>
 <polygon points="129,130 129,162 159,146" fill="${t.g2}" opacity="0.85" transform="translate(3,0)"/>
 <polygon points="129,130 129,162 159,146" fill="${t.title}"/>
 <g stroke-width="2" stroke-linecap="round">
  <line x1="178" y1="146" x2="252" y2="118" stroke="#C2683C"/><line x1="178" y1="146" x2="256" y2="134" stroke="#D99A3C"/>
  <line x1="178" y1="146" x2="256" y2="150" stroke="#5FA05F"/><line x1="178" y1="146" x2="256" y2="166" stroke="#3E8FB0"/>
  <line x1="178" y1="146" x2="252" y2="182" stroke="#7B5EA8"/></g>
 <text x="166" y="262" text-anchor="middle" fill="${t.title}" font-family="Georgia,serif" font-size="30" font-weight="600">MANIPULATIVE</text>
 <text x="163" y="300" text-anchor="middle" fill="${t.g1}" font-family="Georgia,serif" font-size="34" font-weight="700" opacity="0.9">REALITIES</text>
 <text x="169" y="300" text-anchor="middle" fill="${t.g2}" font-family="Georgia,serif" font-size="34" font-weight="700" opacity="0.9">REALITIES</text>
 <text x="166" y="300" text-anchor="middle" fill="${t.title}" font-family="Georgia,serif" font-size="34" font-weight="700">REALITIES</text>
 <g><rect x="118" y="323" width="19" height="3" fill="#C2683C"/><rect x="137" y="323" width="19" height="3" fill="#D99A3C"/><rect x="156" y="323" width="19" height="3" fill="#5FA05F"/><rect x="175" y="323" width="19" height="3" fill="#3E8FB0"/><rect x="194" y="323" width="19" height="3" fill="#7B5EA8"/></g>
 <text x="166" y="352" text-anchor="middle" fill="${t.sub}" font-family="Georgia,serif" font-style="italic" font-size="14.5">Viral Propaganda of</text>
 <text x="166" y="372" text-anchor="middle" fill="${t.sub}" font-family="Georgia,serif" font-style="italic" font-size="14.5">Digital Deception</text>
 <text x="166" y="442" text-anchor="middle" fill="${t.author}" font-family="Inter,sans-serif" font-size="12.5" font-weight="500" letter-spacing="2.5">DR. SHALU CHOPRA</text>
</svg>`;}
document.getElementById('grid').innerHTML=themes.map(function(t){return '<div class="opt"><div class="cover">'+cover(t)+'</div><p>'+t.name+'</p></div>';}).join('');
</script></body></html>
